services:
  - type: web
    name: insureflow-backend
    runtime: node
    buildCommand: npm install && npm run build:backend
    startCommand: npm run start:backend
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
